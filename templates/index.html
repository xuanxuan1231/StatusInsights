<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Status Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"/>
    <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
<div class="page">
    <header class="hero">
        <div>
            <p class="eyebrow">Status Insights</p>
            <h1 id="name">--</h1>
        </div>
        <div class="hero-tools">
            <div class="theme-switcher" role="group" aria-label="颜色模式">
                <button type="button" class="theme-pill-btn" data-theme-mode="auto" aria-label="自动模式" title="自动">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="3.5" y="4.5" width="17" height="11" rx="2"></rect>
                        <path d="M8 19.5h8M10 15.5v4M14 15.5v4"></path>
                    </svg>
                </button>
                <button type="button" class="theme-pill-btn" data-theme-mode="light" aria-label="浅色模式" title="浅色">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2.5v2.5M12 19v2.5M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M2.5 12H5M19 12h2.5M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8"></path>
                    </svg>
                </button>
                <button type="button" class="theme-pill-btn" data-theme-mode="dark" aria-label="深色模式" title="深色">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20 14.4A8.5 8.5 0 1 1 9.6 4a7 7 0 1 0 10.4 10.4Z"></path>
                    </svg>
                </button>
            </div>
            <div class="refresh">
                <span class="dot" id="pulse"></span>
                <span id="last-updated">等待刷新</span>
            </div>
        </div>
    </header>

    <main class="stack">
        <section class="card person">
            <div class="person-status-text" id="person-status">--</div>
            <p class="caption" id="person-description">--</p>
        </section>

        <section class="device-section" id="device-section" aria-labelledby="device-title">
            <div class="device-header-row">
                <h2 id="device-title" class="section-title">设备状态</h2>
                <span class="badge neutral" id="device-count">0</span>
            </div>
            <div id="device-list" class="device-grid"></div>
        </section>

        <p class="caption empty-state" id="device-empty">无在线设备</p>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <span>(c) 2026 Wenxuan Shen</span>
            <span class="footer-sep">·</span>
            <span>在 MIT Licence 下开源</span>
        </div>
    </footer>
</div>

<script src="/static/app.js"></script>
</body>
</html>
